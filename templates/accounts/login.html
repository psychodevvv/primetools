{% extends 'base.html' %}
{% block title %}Вход — PrimeTools{% endblock %}
{% block cat_nav %}{% endblock %}
{% block content %}
<div class="container" style="display:flex;justify-content:center;padding:70px 20px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:26px;">
      <h1 style="font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1.5px;color:var(--heading);margin-bottom:4px;">ВХОД</h1>
      <p style="color:var(--text-muted);font-size:14px;">По номеру телефона и паролю</p>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:34px;box-shadow:var(--shadow);">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Номер телефона</label>
          <input type="tel" name="phone" class="form-control" data-phone
                 value="{{ phone|default:'' }}"
                 placeholder="+7 (___) ___ __ __" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Ваш пароль" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">Войти</button>
      </form>
      <div style="text-align:center;margin-top:22px;padding-top:22px;border-top:1px solid var(--border);color:var(--text-muted);font-size:14px;">
        Нет аккаунта? <a href="/account/register/" style="color:var(--accent);font-weight:700;">Зарегистрироваться</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
