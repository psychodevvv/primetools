{% extends 'base.html' %}
{% block title %}Регистрация — PrimeTools{% endblock %}
{% block cat_nav %}{% endblock %}
{% block content %}
<div class="container" style="display:flex;justify-content:center;padding:70px 20px;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:26px;">
      <h1 style="font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1.5px;color:var(--heading);margin-bottom:4px;">РЕГИСТРАЦИЯ</h1>
      <p style="color:var(--text-muted);font-size:14px;">Создайте аккаунт по номеру и паролю</p>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:34px;box-shadow:var(--shadow);">
      <form method="post">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group">
            <label class="form-label">Имя *</label>
            <input type="text" name="first_name" class="form-control" value="{{ first_name|default:'' }}" placeholder="Иван" required>
          </div>
          <div class="form-group">
            <label class="form-label">Фамилия</label>
            <input type="text" name="last_name" class="form-control" value="{{ last_name|default:'' }}" placeholder="Иванов">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Номер телефона *</label>
          <input type="tel" name="phone" class="form-control" data-phone
                 value="{{ phone|default:'' }}"
                 placeholder="+7 (___) ___ __ __" required>
        </div>
        <div class="form-group">
          <label class="form-label">Пароль * <span style="color:var(--text-muted);font-weight:400;">(минимум 6 символов)</span></label>
          <input type="password" name="password" class="form-control"
                 placeholder="Придумайте пароль" autocomplete="new-password"
                 minlength="6" required>
        </div>
        <div class="form-group">
          <label class="form-label">Повторите пароль *</label>
          <input type="password" name="password2" class="form-control"
                 placeholder="Ещё раз" autocomplete="new-password"
                 minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px;">Создать аккаунт</button>
      </form>
      <div style="text-align:center;margin-top:22px;padding-top:22px;border-top:1px solid var(--border);color:var(--text-muted);font-size:14px;">
        Уже есть аккаунт? <a href="/account/login/" style="color:var(--accent);font-weight:700;">Войти</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
