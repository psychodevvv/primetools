<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Админ-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; color: #E0E0E0; font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 28px; letter-spacing: 1px; }
    .login-logo span { color: #FF6B00; }
    .login-logo small { display: block; font-size: 13px; font-weight: 400; color: #666; letter-spacing: 0; margin-top: 2px; }
    .card { background: #1C1C1C; border: 1px solid #2A2A2A; border-top: 4px solid #FF6B00; padding: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #666; margin-bottom: 6px; }
    .form-control { width: 100%; background: #111; border: 1px solid #2A2A2A; color: #E0E0E0; padding: 10px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
    .form-control:focus { border-color: #FF6B00; }
    .btn { display: block; width: 100%; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: #FF6B00; color: #fff; border: none; cursor: pointer; transition: background .2s; margin-top: 20px; }
    .btn:hover { background: #CC5500; }
    .messages { list-style: none; margin-bottom: 16px; }
    .messages li { padding: 10px 14px; font-size: 13px; font-weight: 600; border-left: 3px solid #E53935; background: rgba(229,57,53,.12); color: #EF9A9A; margin-bottom: 6px; }
    a { color: #FF6B00; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Prime<span>Tools</span><small>Панель администратора</small></div>
    <div class="card">
      {% if messages %}
      <ul class="messages">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Логин</label>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Войти в панель</button>
      </form>
    </div>
    <div style="text-align:center; margin-top:16px; font-size:13px; color:#555;">
      <a href="/">← На сайт</a>
    </div>
  </div>
</body>
</html>
